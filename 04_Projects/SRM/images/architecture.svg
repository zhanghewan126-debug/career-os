<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="940" height="800" viewBox="0 0 940 800" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333333"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666666"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="800" fill="#ffffff"/>

  <text x="60" y="34" font-size="20" font-weight="bold" fill="#333333">SRM System Architecture</text>
  <text x="60" y="56" font-size="12" fill="#666666">Enterprise Supplier Relationship Management System</text>

  <!-- connecting arrows between layer bands -->
  <g stroke="#333333" stroke-width="2" fill="none">
    <path d="M470,160 L470,180" marker-end="url(#arrow)"/>
    <path d="M470,260 L470,280" marker-end="url(#arrow)"/>
    <path d="M470,430 L470,460" marker-end="url(#arrow)"/>
    <path d="M470,540 L470,560" marker-end="url(#arrow)"/>
  </g>
  <path d="M880,430 L880,470 L880,650" fill="none" stroke="#666666" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <text x="888" y="560" font-size="9" fill="#666666">启信宝 / 通知</text>
  <path d="M700,505 L700,570" fill="none" stroke="#666666" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dashed)"/>
  <text x="708" y="540" font-size="9" fill="#666666">DB Link</text>

  <!-- User Layer -->
  <rect x="60" y="80" width="820" height="80" rx="6" fill="#f5f5f5" stroke="#666666"/>
  <text x="72" y="98" font-size="12" font-weight="bold" fill="#333333">User Layer</text>
  <g font-size="10" text-anchor="middle" fill="#333333">
    <rect x="80" y="112" width="140" height="34" rx="5" fill="#ffffff" stroke="#999999"/>
    <text x="150" y="133">采购</text>
    <rect x="240" y="112" width="140" height="34" rx="5" fill="#ffffff" stroke="#999999"/>
    <text x="310" y="133">品保 / SQE</text>
    <rect x="400" y="112" width="140" height="34" rx="5" fill="#ffffff" stroke="#999999"/>
    <text x="470" y="133">供应商联络人</text>
    <rect x="560" y="112" width="140" height="34" rx="5" fill="#ffffff" stroke="#999999"/>
    <text x="630" y="133">财务</text>
    <rect x="720" y="112" width="140" height="34" rx="5" fill="#ffffff" stroke="#999999"/>
    <text x="790" y="133">法务</text>
  </g>

  <!-- Presentation Layer -->
  <rect x="60" y="180" width="820" height="80" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="72" y="198" font-size="12" font-weight="bold" fill="#333333">Presentation Layer</text>
  <g font-size="10" text-anchor="middle" fill="#333333">
    <rect x="80" y="212" width="200" height="34" rx="5" fill="#ffffff" stroke="#6c8ebf"/>
    <text x="180" y="233">模板渲染 template</text>
    <rect x="300" y="212" width="260" height="34" rx="5" fill="#ffffff" stroke="#6c8ebf"/>
    <text x="430" y="233">动态下拉 select（20+ 类型）</text>
    <rect x="580" y="212" width="200" height="34" rx="5" fill="#ffffff" stroke="#6c8ebf"/>
    <text x="680" y="233">数据网格 data2json</text>
  </g>

  <!-- Application Layer -->
  <rect x="60" y="280" width="820" height="150" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="72" y="298" font-size="12" font-weight="bold" fill="#333333">Application Layer（业务模块）</text>
  <g font-size="10" text-anchor="middle" fill="#333333">
    <rect x="80" y="312" width="180" height="40" rx="5" fill="#ffffff" stroke="#82b366"/>
    <text x="170" y="336">建档申请</text>
    <rect x="280" y="312" width="180" height="40" rx="5" fill="#ffffff" stroke="#82b366"/>
    <text x="370" y="336">资料变更</text>
    <rect x="480" y="312" width="180" height="40" rx="5" fill="#ffffff" stroke="#82b366"/>
    <text x="570" y="336">查询与合约附档</text>
    <rect x="680" y="312" width="180" height="40" rx="5" fill="#ffffff" stroke="#82b366"/>
    <text x="770" y="336">评鉴管理</text>
    <rect x="80" y="362" width="180" height="40" rx="5" fill="#ffffff" stroke="#82b366"/>
    <text x="170" y="386">配合性评分</text>
    <rect x="280" y="362" width="280" height="40" rx="5" fill="#ffffff" stroke="#82b366"/>
    <text x="420" y="386">绩效评分统计（动态 SQL 引擎）</text>
    <rect x="580" y="362" width="280" height="40" rx="5" fill="#ffffff" stroke="#82b366"/>
    <text x="720" y="386">Workflow 签核引擎对接</text>
  </g>

  <!-- Data Access Layer -->
  <rect x="60" y="460" width="820" height="80" rx="6" fill="#fff2cc" stroke="#d6b656"/>
  <text x="72" y="478" font-size="12" font-weight="bold" fill="#333333">Data Access Layer</text>
  <rect x="80" y="492" width="760" height="34" rx="5" fill="#ffffff" stroke="#d6b656"/>
  <text x="460" y="514" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#333333">Oracle PL/SQL 存储过程包　AP_SUPPLIER_MANAGE_PKG（30+ 过程/函数）</text>

  <!-- Database Layer -->
  <rect x="60" y="560" width="820" height="90" rx="6" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="72" y="578" font-size="12" font-weight="bold" fill="#333333">Database Layer</text>
  <g font-size="10" text-anchor="middle" fill="#333333">
    <rect x="80" y="592" width="220" height="40" rx="5" fill="#ffffff" stroke="#d79b00"/>
    <text x="190" y="616">Oracle EIP 本地库</text>
    <rect x="340" y="592" width="220" height="40" rx="5" fill="#ffffff" stroke="#d79b00"/>
    <text x="450" y="608">Oracle EBS（@iei_prod）</text>
    <text x="450" y="622">AP / PO 模块</text>
    <rect x="600" y="592" width="260" height="40" rx="5" fill="#ffffff" stroke="#d79b00"/>
    <text x="730" y="608">MES（@MES_QNP）</text>
    <text x="730" y="622">品检数据</text>
  </g>

  <!-- External Integration -->
  <rect x="60" y="680" width="820" height="80" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="72" y="698" font-size="12" font-weight="bold" fill="#333333">External Integration</text>
  <g font-size="10" text-anchor="middle" fill="#333333">
    <rect x="80" y="712" width="380" height="34" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="270" y="733">启信宝 API（企业工商信息校验 / 查重）</text>
    <rect x="480" y="712" width="380" height="34" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="670" y="733">邮件 / 企业微信通知渠道</text>
  </g>
</svg>
