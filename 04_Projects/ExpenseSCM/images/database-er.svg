<svg xmlns="http://www.w3.org/2000/svg" width="1340" height="1000" viewBox="0 0 1340 1000" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
    <marker id="open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#777777" stroke-width="1.3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1340" height="1000" fill="#ffffff"/>

  <!-- Title -->
  <text x="60" y="34" font-size="19" font-weight="bold" fill="#333333">ExpenseSCM Database ER Diagram｜核心表关系图</text>

  <!-- ===== Zones ===== -->
  <rect x="40" y="50" width="280" height="910" rx="8" fill="none" stroke="#6c8ebf" stroke-dasharray="6,4"/>
  <text x="52" y="70" font-size="12" font-weight="bold" fill="#6c8ebf">采购链 Procurement</text>

  <rect x="360" y="430" width="280" height="540" rx="8" fill="none" stroke="#82b366" stroke-dasharray="6,4"/>
  <text x="372" y="450" font-size="12" font-weight="bold" fill="#82b366">验收链 Receiving</text>

  <rect x="680" y="50" width="290" height="830" rx="8" fill="none" stroke="#d79b00" stroke-dasharray="6,4"/>
  <text x="692" y="70" font-size="12" font-weight="bold" fill="#d79b00">库存核心 Inventory Core</text>

  <rect x="1010" y="430" width="290" height="420" rx="8" fill="none" stroke="#9673a6" stroke-dasharray="6,4"/>
  <text x="1022" y="450" font-size="12" font-weight="bold" fill="#9673a6">主数据与成本 Master Data &amp; Cost</text>

  <!-- ===== Legend ===== -->
  <rect x="1010" y="90" width="290" height="156" rx="6" fill="#f5f5f5" stroke="#666666"/>
  <text x="1022" y="108" font-size="12" font-weight="bold" fill="#333333">图例</text>
  <rect x="1022" y="116" width="12" height="12" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="1040" y="126" font-size="11" fill="#333333">采购链 Procurement</text>
  <rect x="1022" y="136" width="12" height="12" fill="#d5e8d4" stroke="#82b366"/>
  <text x="1040" y="146" font-size="11" fill="#333333">验收链 Receiving</text>
  <rect x="1022" y="156" width="12" height="12" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="1040" y="166" font-size="11" fill="#333333">库存核心 Inventory Core</text>
  <rect x="1022" y="176" width="12" height="12" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="1040" y="186" font-size="11" fill="#333333">主数据与成本 Master Data &amp; Cost</text>
  <line x1="1022" y1="203" x2="1054" y2="203" stroke="#555555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1062" y="207" font-size="11" fill="#333333">实线：外键 / 过账数据流</text>
  <line x1="1022" y1="223" x2="1054" y2="223" stroke="#777777" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#open)"/>
  <text x="1062" y="227" font-size="11" fill="#333333">虚线：引用 / 追溯关系　PK 主键 FK 外键</text>

  <!-- ===== Edges (drawn under entities' labels but above zones) ===== -->
  <g stroke="#555555" stroke-width="1.5" fill="none">
    <path d="M180,220 L180,270" marker-end="url(#arrow)"/>
    <path d="M180,400 L180,450" marker-end="url(#arrow)"/>
    <path d="M180,580 L180,630" marker-end="url(#arrow)"/>
    <path d="M180,760 L180,810" marker-end="url(#arrow)"/>
    <path d="M300,875 L340,875 L340,710 L380,710" marker-end="url(#arrow)"/>
    <path d="M500,590 L500,640" marker-end="url(#arrow)"/>
    <path d="M500,780 L500,830" marker-end="url(#arrow)"/>
    <path d="M620,890 L660,890 L660,540 L700,540" marker-end="url(#arrow)"/>
    <path d="M825,610 L825,680" marker-end="url(#arrow)"/>
    <path d="M950,505 L960,505 L960,150 L950,150" marker-end="url(#arrow)"/>
    <path d="M950,575 L990,575 L990,742 L1030,742" marker-end="url(#arrow)"/>
  </g>
  <g stroke="#777777" stroke-width="1.3" fill="none" stroke-dasharray="5,4">
    <path d="M300,335 L340,335 L340,695 L300,695" marker-end="url(#open)"/>
    <path d="M825,210 L825,270" marker-start="url(#open)" marker-end="url(#open)"/>
    <path d="M1030,530 L950,530" marker-end="url(#open)"/>
  </g>

  <!-- Edge labels -->
  <g font-size="10" fill="#444444" paint-order="stroke" stroke="#ffffff" stroke-width="3">
    <text x="188" y="250">1 : N</text>
    <text x="188" y="430">归并生成 PO</text>
    <text x="188" y="610">1 : N</text>
    <text x="188" y="790">1 : N</text>
    <text x="508" y="620">1 : N</text>
    <text x="508" y="815">1 : N（事务链）</text>
    <text x="833" y="650">创建 / FIFO 扣减批次</text>
    <text x="833" y="247">供需匹配 · 可用量</text>
    <text x="975" y="524" text-anchor="middle">item_id</text>
    <text transform="rotate(-90 352 515)" x="352" y="515" text-anchor="middle">prepare_id 追溯</text>
    <text transform="rotate(-90 332 793)" x="332" y="793" text-anchor="middle">收货核销</text>
    <text transform="rotate(-90 668 715)" x="668" y="715" text-anchor="middle">DELIVER / RETURN 过账</text>
    <text transform="rotate(-90 982 330)" x="982" y="330" text-anchor="middle">供应层流转</text>
    <text transform="rotate(-90 1002 660)" x="1002" y="660" text-anchor="middle">按期间汇总入库 / 验退金额</text>
  </g>

  <!-- ===== Entities ===== -->
  <!-- EXP_ITEMS_REQUISITION -->
  <g>
    <rect x="60" y="90" width="240" height="130" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
    <line x1="60" y1="116" x2="300" y2="116" stroke="#6c8ebf"/>
    <text x="180" y="107" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_ITEMS_REQUISITION（请购单）</text>
    <text x="68" y="132" font-size="10" fill="#333333">
      <tspan x="68" font-weight="bold">PK requisition_id</tspan>
      <tspan x="68" dy="16">requisition_number</tspan>
      <tspan x="68" dy="16">org_id</tspan>
      <tspan x="68" dy="16">FK item_id</tspan>
      <tspan x="68" dy="16">quantity</tspan>
      <tspan x="68" dy="16">audit_order_id</tspan>
    </text>
  </g>

  <!-- EXPENSE_PO_PREPARE_ALL -->
  <g>
    <rect x="60" y="270" width="240" height="130" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
    <line x1="60" y1="296" x2="300" y2="296" stroke="#6c8ebf"/>
    <text x="180" y="287" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXPENSE_PO_PREPARE_ALL（采购准备）</text>
    <text x="68" y="312" font-size="10" fill="#333333">
      <tspan x="68" font-weight="bold">PK prepare_id</tspan>
      <tspan x="68" dy="16">FK requisition_id</tspan>
      <tspan x="68" dy="16">vendor_id / vendor_site_id</tspan>
      <tspan x="68" dy="16">currency_code</tspan>
      <tspan x="68" dy="16">unit_price / tax_rate</tspan>
      <tspan x="68" dy="16">audit_order_id</tspan>
    </text>
  </g>

  <!-- EXP_PO_HEADERS_ALL -->
  <g>
    <rect x="60" y="450" width="240" height="130" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
    <line x1="60" y1="476" x2="300" y2="476" stroke="#6c8ebf"/>
    <text x="180" y="467" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_PO_HEADERS_ALL（采购订单头）</text>
    <text x="68" y="492" font-size="10" fill="#333333">
      <tspan x="68" font-weight="bold">PK po_header_id</tspan>
      <tspan x="68" dy="16">po_number</tspan>
      <tspan x="68" dy="16">vendor_id / vendor_site_id</tspan>
      <tspan x="68" dy="16">currency_code / terms_id</tspan>
      <tspan x="68" dy="16">total_amount</tspan>
      <tspan x="68" dy="16">status</tspan>
    </text>
  </g>

  <!-- EXP_PO_LINES_ALL -->
  <g>
    <rect x="60" y="630" width="240" height="130" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
    <line x1="60" y1="656" x2="300" y2="656" stroke="#6c8ebf"/>
    <text x="180" y="647" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_PO_LINES_ALL（采购订单行）</text>
    <text x="68" y="672" font-size="10" fill="#333333">
      <tspan x="68" font-weight="bold">PK po_line_id</tspan>
      <tspan x="68" dy="16">FK po_header_id</tspan>
      <tspan x="68" dy="16">line_num</tspan>
      <tspan x="68" dy="16">FK item_id</tspan>
      <tspan x="68" dy="16">quantity / unit_price</tspan>
      <tspan x="68" dy="16">FK prepare_id</tspan>
    </text>
  </g>

  <!-- EXP_PO_LINE_LOCATIONS_ALL -->
  <g>
    <rect x="60" y="810" width="240" height="130" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
    <line x1="60" y1="836" x2="300" y2="836" stroke="#6c8ebf"/>
    <text x="180" y="827" font-size="11" font-weight="bold" text-anchor="middle" fill="#333333">EXP_PO_LINE_LOCATIONS_ALL（发运行）</text>
    <text x="68" y="852" font-size="10" fill="#333333">
      <tspan x="68" font-weight="bold">PK line_location_id</tspan>
      <tspan x="68" dy="16">FK po_line_id</tspan>
      <tspan x="68" dy="16">promised_date</tspan>
      <tspan x="68" dy="16">quantity</tspan>
      <tspan x="68" dy="16">quantity_received / accepted</tspan>
      <tspan x="68" dy="16">quantity_rejected</tspan>
    </text>
  </g>

  <!-- EXP_RCV_SHIPMENT_HEADERS -->
  <g>
    <rect x="380" y="470" width="240" height="120" rx="6" fill="#d5e8d4" stroke="#82b366"/>
    <line x1="380" y1="496" x2="620" y2="496" stroke="#82b366"/>
    <text x="500" y="487" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_RCV_SHIPMENT_HEADERS（验收单头）</text>
    <text x="388" y="512" font-size="10" fill="#333333">
      <tspan x="388" font-weight="bold">PK shipment_header_id</tspan>
      <tspan x="388" dy="16">shipment_num</tspan>
      <tspan x="388" dy="16">vendor_id</tspan>
      <tspan x="388" dy="16">receipt_date</tspan>
      <tspan x="388" dy="16">status</tspan>
    </text>
  </g>

  <!-- EXP_RCV_SHIPMENT_LINES -->
  <g>
    <rect x="380" y="640" width="240" height="140" rx="6" fill="#d5e8d4" stroke="#82b366"/>
    <line x1="380" y1="666" x2="620" y2="666" stroke="#82b366"/>
    <text x="500" y="657" font-size="11" font-weight="bold" text-anchor="middle" fill="#333333">EXP_RCV_SHIPMENT_LINES（验收单行）</text>
    <text x="388" y="682" font-size="10" fill="#333333">
      <tspan x="388" font-weight="bold">PK shipment_line_id</tspan>
      <tspan x="388" dy="16">FK shipment_header_id</tspan>
      <tspan x="388" dy="16">FK line_location_id</tspan>
      <tspan x="388" dy="16">FK item_id</tspan>
      <tspan x="388" dy="16">quantity_received</tspan>
      <tspan x="388" dy="16">sample_qty / pass_qty</tspan>
      <tspan x="388" dy="16">exception_flag</tspan>
    </text>
  </g>

  <!-- EXP_RCV_TRANSACTIONS -->
  <g>
    <rect x="380" y="830" width="240" height="130" rx="6" fill="#d5e8d4" stroke="#82b366"/>
    <line x1="380" y1="856" x2="620" y2="856" stroke="#82b366"/>
    <text x="500" y="847" font-size="11" font-weight="bold" text-anchor="middle" fill="#333333">EXP_RCV_TRANSACTIONS（验收事务）</text>
    <text x="388" y="872" font-size="10" fill="#333333">
      <tspan x="388" font-weight="bold">PK rcv_transaction_id</tspan>
      <tspan x="388" dy="16">FK shipment_line_id</tspan>
      <tspan x="388" dy="16">transaction_type</tspan>
      <tspan x="388" dy="16">（RECEIVE / INSPECT / DELIVER / RETURN）</tspan>
      <tspan x="388" dy="16">quantity</tspan>
      <tspan x="388" dy="16">FK parent_transaction_id</tspan>
    </text>
  </g>

  <!-- EXP_MTL_SUPPLY -->
  <g>
    <rect x="700" y="90" width="250" height="120" rx="6" fill="#ffe6cc" stroke="#d79b00"/>
    <line x1="700" y1="116" x2="950" y2="116" stroke="#d79b00"/>
    <text x="825" y="107" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_MTL_SUPPLY（供应层）</text>
    <text x="708" y="132" font-size="10" fill="#333333">
      <tspan x="708" font-weight="bold">PK supply_id</tspan>
      <tspan x="708" dy="16">FK item_id / org_id</tspan>
      <tspan x="708" dy="16">supply_type_code（PR…RETURN 7 层）</tspan>
      <tspan x="708" dy="16">supply_source_type / id</tspan>
      <tspan x="708" dy="16">quantity</tspan>
    </text>
  </g>

  <!-- EXP_MTL_DEMAND -->
  <g>
    <rect x="700" y="270" width="250" height="120" rx="6" fill="#ffe6cc" stroke="#d79b00"/>
    <line x1="700" y1="296" x2="950" y2="296" stroke="#d79b00"/>
    <text x="825" y="287" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_MTL_DEMAND（需求层）</text>
    <text x="708" y="312" font-size="10" fill="#333333">
      <tspan x="708" font-weight="bold">PK demand_id</tspan>
      <tspan x="708" dy="16">FK item_id / org_id</tspan>
      <tspan x="708" dy="16">demand_source_type / id</tspan>
      <tspan x="708" dy="16">quantity / need_by_date</tspan>
      <tspan x="708" dy="16">status</tspan>
    </text>
  </g>

  <!-- note between DEM and MMT -->
  <text x="703" y="424" font-size="9" fill="#d79b00">PR / PPR / PO / RCV 各业务节点核准过账时，</text>
  <text x="703" y="437" font-size="9" fill="#d79b00">数量在对应供应层之间流转</text>

  <!-- EXP_MTL_MATERIAL_TRANS -->
  <g>
    <rect x="700" y="470" width="250" height="140" rx="6" fill="#ffe6cc" stroke="#d79b00"/>
    <line x1="700" y1="496" x2="950" y2="496" stroke="#d79b00"/>
    <text x="825" y="487" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_MTL_MATERIAL_TRANS（库存事务）</text>
    <text x="708" y="512" font-size="10" fill="#333333">
      <tspan x="708" font-weight="bold">PK transaction_id</tspan>
      <tspan x="708" dy="16">FK item_id / org_id</tspan>
      <tspan x="708" dy="16">transaction_type_id</tspan>
      <tspan x="708" dy="16">transaction_quantity（±）</tspan>
      <tspan x="708" dy="16">source_type / source_id（幂等键）</tspan>
      <tspan x="708" dy="16">transaction_cost</tspan>
      <tspan x="708" dy="16">period_name</tspan>
    </text>
  </g>

  <!-- EXP_MTL_ONHAND_QTY_DETAIL -->
  <g>
    <rect x="700" y="680" width="250" height="130" rx="6" fill="#ffe6cc" stroke="#d79b00"/>
    <line x1="700" y1="706" x2="950" y2="706" stroke="#d79b00"/>
    <text x="825" y="697" font-size="10.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_MTL_ONHAND_QTY_DETAIL（在库明细）</text>
    <text x="708" y="722" font-size="10" fill="#333333">
      <tspan x="708" font-weight="bold">PK onhand_id</tspan>
      <tspan x="708" dy="16">FK item_id / org_id</tspan>
      <tspan x="708" dy="16">subinventory_code</tspan>
      <tspan x="708" dy="16">receipt_date（FIFO 依据）</tspan>
      <tspan x="708" dy="16">original / remain_quantity</tspan>
      <tspan x="708" dy="16">FK source_transaction_id</tspan>
    </text>
  </g>

  <!-- EXP_SYSTEM_ITEMS -->
  <g>
    <rect x="1030" y="470" width="250" height="120" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
    <line x1="1030" y1="496" x2="1280" y2="496" stroke="#9673a6"/>
    <text x="1155" y="487" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">EXP_SYSTEM_ITEMS（物料主档）</text>
    <text x="1038" y="512" font-size="10" fill="#333333">
      <tspan x="1038" font-weight="bold">PK item_id（EBS DB Link 同步）</tspan>
      <tspan x="1038" dy="16">item_number</tspan>
      <tspan x="1038" dy="16">description</tspan>
      <tspan x="1038" dy="16">primary_uom_code</tspan>
      <tspan x="1038" dy="16">hazard_flag</tspan>
    </text>
  </g>
  <text x="1030" y="606" font-size="9" fill="#9673a6">item_id 被所有业务表引用（图中仅示意主要引用）</text>

  <!-- ITEM_PERIOD_COST -->
  <g>
    <rect x="1030" y="660" width="250" height="165" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
    <line x1="1030" y1="686" x2="1280" y2="686" stroke="#9673a6"/>
    <text x="1155" y="677" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">ITEM_PERIOD_COST（期间成本）</text>
    <text x="1038" y="702" font-size="10" fill="#333333">
      <tspan x="1038" font-weight="bold">PK period_cost_id</tspan>
      <tspan x="1038" dy="16">FK item_id / org_id</tspan>
      <tspan x="1038" dy="16">period_name</tspan>
      <tspan x="1038" dy="16">begin_quantity / begin_amount</tspan>
      <tspan x="1038" dy="16">receipt / return / issue 数量金额</tspan>
      <tspan x="1038" dy="16">unit_cost（月度加权平均）</tspan>
      <tspan x="1038" dy="16">end_quantity / end_amount → 结转</tspan>
      <tspan x="1038" dy="16">closed_flag</tspan>
    </text>
  </g>
</svg>
