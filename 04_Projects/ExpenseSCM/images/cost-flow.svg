<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="640" viewBox="0 0 1240 640" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
    <marker id="open" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1,1 L9,5 L1,9" fill="none" stroke="#777777" stroke-width="1.3"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="640" fill="#ffffff"/>
  <text x="60" y="32" font-size="18" font-weight="bold" fill="#333333">ExpenseSCM Cost Flow｜月度加权平均成本核算（ITEM_PERIOD_COST）</text>

  <!-- edges -->
  <g stroke="#555555" stroke-width="1.5" fill="none">
    <path d="M230,165 L265,165 L265,140 L590,140" marker-end="url(#arrow)"/>
    <path d="M520,95 L555,95 L555,118 L590,118" marker-end="url(#arrow)"/>
    <path d="M520,185 L590,185" marker-end="url(#arrow)"/>
    <path d="M890,160 L990,160" marker-end="url(#arrow)"/>
    <path d="M740,220 L740,300" marker-end="url(#arrow)"/>
  </g>
  <path d="M1090,210 L1090,250 L140,250 L140,210" fill="none" stroke="#777777" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#open)"/>

  <g font-size="10" fill="#444444" paint-order="stroke" stroke="#ffffff" stroke-width="3">
    <text x="940" y="153" text-anchor="middle">期末滚动结转</text>
    <text x="748" y="264">unit_cost</text>
    <text x="615" y="244" text-anchor="middle">结转为下一期间期初</text>
  </g>

  <!-- begin -->
  <rect x="50" y="120" width="180" height="90" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="140" y="150" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">期初 Begin</text>
  <text x="140" y="170" font-size="10" text-anchor="middle" fill="#555555">begin_qty / begin_amount</text>
  <text x="140" y="188" font-size="10" text-anchor="middle" fill="#555555">＝上期期末结转</text>

  <!-- receipt -->
  <rect x="300" y="60" width="220" height="70" rx="6" fill="#d5e8d4" stroke="#82b366"/>
  <text x="410" y="88" font-size="11" font-weight="bold" text-anchor="middle" fill="#333333">本期入库 ＋</text>
  <text x="410" y="108" font-size="9.5" text-anchor="middle" fill="#555555">Σ 入库事务金额（按 PO 单价）</text>

  <!-- return -->
  <rect x="300" y="150" width="220" height="70" rx="6" fill="#f8cecc" stroke="#b85450"/>
  <text x="410" y="178" font-size="11" font-weight="bold" text-anchor="middle" fill="#333333">本期验退 －</text>
  <text x="410" y="198" font-size="9.5" text-anchor="middle" fill="#555555">Σ 验退事务金额（原入库成本冲减）</text>

  <!-- calc -->
  <rect x="590" y="100" width="300" height="120" rx="6" fill="#fff2cc" stroke="#d6b656"/>
  <text x="740" y="126" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">月结计算 unit_cost（加权平均）</text>
  <text x="740" y="152" font-size="9.5" text-anchor="middle" fill="#333333">unit_cost ＝</text>
  <text x="740" y="172" font-size="9.5" text-anchor="middle" fill="#333333">（期初成本×期初数量＋本期入库金额－本期验退金额）</text>
  <text x="740" y="192" font-size="9.5" text-anchor="middle" fill="#333333">÷（期初数量＋本期入库数量－本期验退数量）</text>

  <!-- end -->
  <rect x="990" y="120" width="200" height="90" rx="6" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="1090" y="150" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">期末 End</text>
  <text x="1090" y="170" font-size="10" text-anchor="middle" fill="#555555">end_qty / end_amount</text>
  <text x="1090" y="188" font-size="10" text-anchor="middle" fill="#555555">closed_flag 期间关闭</text>

  <!-- issue -->
  <rect x="590" y="300" width="300" height="90" rx="6" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="740" y="330" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#333333">领用出库 Issue</text>
  <text x="740" y="350" font-size="10" text-anchor="middle" fill="#555555">按当期 unit_cost 计价 → issue_amount</text>
  <text x="740" y="368" font-size="10" text-anchor="middle" fill="#555555">（不参与单位成本重算）</text>

  <!-- month-end close strip -->
  <rect x="40" y="430" width="1160" height="120" rx="8" fill="none" stroke="#9673a6" stroke-dasharray="6,4"/>
  <text x="52" y="450" font-size="12" font-weight="bold" fill="#9673a6">月结流程 Month-End Close</text>

  <g font-size="9.5" text-anchor="middle" fill="#333333">
    <rect x="60" y="460" width="170" height="50" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="145" y="481">校验本期事务</text>
    <text x="145" y="495">全部过账</text>
    <rect x="250" y="460" width="170" height="50" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="335" y="481">汇总入库 /</text>
    <text x="335" y="495">验退 / 领用</text>
    <rect x="440" y="460" width="170" height="50" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="525" y="489">计算 unit_cost</text>
    <rect x="630" y="460" width="170" height="50" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="715" y="481">回写本期</text>
    <text x="715" y="495">出库事务成本</text>
    <rect x="820" y="460" width="170" height="50" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="905" y="481">期末结转</text>
    <text x="905" y="495">下期期初</text>
    <rect x="1010" y="460" width="170" height="50" rx="5" fill="#ffffff" stroke="#9673a6"/>
    <text x="1095" y="481">closed_flag</text>
    <text x="1095" y="495">关闭期间</text>
  </g>
  <g stroke="#555555" stroke-width="1.3" fill="none">
    <path d="M230,485 L250,485" marker-end="url(#arrow)"/>
    <path d="M420,485 L440,485" marker-end="url(#arrow)"/>
    <path d="M610,485 L630,485" marker-end="url(#arrow)"/>
    <path d="M800,485 L820,485" marker-end="url(#arrow)"/>
    <path d="M990,485 L1010,485" marker-end="url(#arrow)"/>
  </g>

  <text x="60" y="585" font-size="9.5" fill="#666666">期间一旦关闭（closed_flag）不允许再过账入该期间，保证已出具的财务数据不被追溯篡改；入库与验退改变价值构成参与重算，领用仅按当期成本转出价值。</text>
</svg>
